default-group: local
groups:
  local:
    generators:
      - name: fernapi/fern-typescript-node-sdk
        version: 0.51.7
        output:
          location: local-file-system
          path: ../sdks/typescript
        smart-casing: false
api:
  specs:
    - openapi: openapi/responses.yaml
      settings: &shared-settings
        title-as-schema-name: true
        type-dates-as-strings: true
        object-query-parameters: false
        idiomatic-request-names: false
        respect-nullable-schemas: false
        wrap-references-to-nullable-in-optional: true
        coerce-optional-schemas-to-nullable: true
        inline-path-parameters: false
        coerce-enums-to-literals: true
    - openapi: openapi/chat-completions.yaml
      settings: *shared-settings
    - openapi: openapi/completions.yaml
      settings: *shared-settings
    - openapi: openapi/embeddings.yaml
      settings: *shared-settings
    - openapi: openapi/audio.yaml
      settings: *shared-settings
    - openapi: openapi/documents.yaml
      settings: *shared-settings
    - openapi: openapi/rerank.yaml
      settings: *shared-settings
    - openapi: openapi/tokenization.yaml
      settings: *shared-settings
    - openapi: openapi/safety.yaml
      settings: *shared-settings
    - openapi: openapi/models.yaml
      settings: *shared-settings
    - openapi: openapi/mcp.yaml
      settings: *shared-settings
